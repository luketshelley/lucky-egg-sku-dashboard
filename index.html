<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Egg — SKU Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #f0f1f7;
    --border: #e2e4ee;
    --accent: #5b52e8;
    --accent2: #00b896;
    --red: #e8394d;
    --green: #00b896;
    --yellow: #f59e0b;
    --text: #1a1d2e;
    --muted: #6b7280;
    --hero: #5b52e8;
    --launch: #00b896;
    --pass: #9ca3af;
    --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.10);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',-apple-system,sans-serif; min-height:100vh; }

  /* ── Header ── */
  .header {
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:0 32px;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky; top:0; z-index:200;
    box-shadow:var(--shadow);
  }
  .logo { display:flex; align-items:center; gap:10px; cursor:pointer; }
  .logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),#8b7ff7); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .logo-text { font-size:16px; font-weight:700; letter-spacing:-0.3px; }
  .logo-sub { font-size:11px; color:var(--muted); }
  .header-right { display:flex; align-items:center; gap:12px; }
  .last-updated { font-size:12px; color:var(--muted); }
  .config-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:7px 14px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:500; transition:all .15s; }
  .config-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* ── Layout: sidebar + main ── */
  .app { display:flex; min-height:calc(100vh - 60px); }

  /* ── Sidebar ── */
  .sidebar {
    width:220px; min-width:220px;
    background:var(--surface);
    border-right:1px solid var(--border);
    padding:16px 0;
    position:sticky; top:60px; height:calc(100vh - 60px);
    overflow-y:auto;
  }
  .sidebar-group { margin-bottom:4px; }
  .sidebar-group-label {
    font-size:10px; font-weight:700; letter-spacing:.7px; text-transform:uppercase;
    color:var(--muted); padding:12px 16px 6px;
  }
  .sidebar-item {
    display:flex; align-items:center; gap:10px;
    padding:9px 16px; cursor:pointer; font-size:13px; font-weight:500;
    color:var(--muted); border-radius:0; transition:all .15s;
    border-left:3px solid transparent;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .sidebar-item:hover { background:var(--surface2); color:var(--text); }
  .sidebar-item.active { background:#ede8ff; color:var(--accent); border-left-color:var(--accent); }
  .sidebar-item.active.launch { background:#e0faf4; color:var(--launch); border-left-color:var(--launch); }
  .sidebar-item.active.pass { background:var(--surface2); color:var(--text); border-left-color:var(--pass); }
  .sku-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dot-hero { background:var(--hero); }
  .dot-launch { background:var(--launch); }
  .dot-pass { background:var(--pass); }

  /* ── Main content ── */
  .main { flex:1; padding:32px; overflow-y:auto; }

  /* ── Setup banner ── */
  .setup-banner {
    background:linear-gradient(135deg,rgba(91,82,232,.08),rgba(0,184,150,.08));
    border:1px solid rgba(91,82,232,.2);
    border-radius:12px; padding:20px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:20px;
    margin-bottom:28px;
  }
  .setup-banner h3 { font-size:14px; font-weight:600; margin-bottom:4px; }
  .setup-banner p { font-size:12px; color:var(--muted); }
  .sheet-input-row { display:flex; gap:8px; align-items:center; }
  .sheet-input { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:9px 13px; border-radius:8px; font-size:12px; width:340px; outline:none; transition:border .15s; }
  .sheet-input:focus { border-color:var(--accent); }
  .connect-btn { background:var(--accent); border:none; color:white; padding:9px 18px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; transition:opacity .15s; white-space:nowrap; }
  .connect-btn:hover { opacity:.85; }

  /* ── SKU page header ── */
  .sku-page-header {
    display:flex; align-items:flex-start; justify-content:space-between;
    margin-bottom:28px; flex-wrap:wrap; gap:12px;
  }
  .sku-title { font-size:24px; font-weight:800; letter-spacing:-.5px; margin-bottom:4px; }
  .sku-meta { display:flex; align-items:center; gap:10px; }
  .sku-id-badge { font-size:12px; font-family:monospace; background:var(--surface2); border:1px solid var(--border); padding:3px 10px; border-radius:20px; color:var(--muted); }
  .badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:.4px; }
  .badge.hero { background:#ede8ff; color:var(--hero); }
  .badge.launch { background:#e0faf4; color:var(--launch); }
  .badge.pass { background:var(--surface2); color:var(--pass); }

  /* ── Summary row ── */
  .summary-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:28px; }
  .summary-card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:16px 18px; box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  .summary-card.primary { border-color:var(--accent); }
  .summary-card::after { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--border); }
  .summary-card.total::after { background:linear-gradient(90deg,var(--accent),#8b7ff7); }
  .summary-card.amazon::after { background:#FF9900; }
  .summary-card.tiktok::after { background:var(--launch); }
  .sc-label { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
  .sc-dot { width:7px; height:7px; border-radius:50%; }
  .sc-value { font-size:28px; font-weight:800; letter-spacing:-1px; line-height:1; margin-bottom:4px; }
  .sc-change { display:flex; align-items:center; gap:4px; font-size:12px; font-weight:600; }
  .sc-change.up { color:var(--green); }
  .sc-change.down { color:var(--red); }
  .sc-change.flat { color:var(--muted); }

  /* ── Channel × Region grid ── */
  .breakdown-section { margin-bottom:28px; }
  .section-title { font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:14px; }
  .breakdown-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; }
  .breakdown-card {
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:14px 16px; box-shadow:var(--shadow);
  }
  .bc-label { font-size:11px; color:var(--muted); font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
  .bc-flag { font-size:14px; }
  .bc-value { font-size:22px; font-weight:800; letter-spacing:-.5px; margin-bottom:2px; }
  .bc-change { font-size:11px; font-weight:600; }
  .bc-change.up { color:var(--green); }
  .bc-change.down { color:var(--red); }
  .bc-change.flat { color:var(--muted); }

  /* ── Chart ── */
  .chart-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 20px 16px; box-shadow:var(--shadow); margin-bottom:28px; }
  .chart-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .chart-title { font-size:13px; font-weight:700; }
  .chart-legend { display:flex; gap:14px; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); font-weight:500; }
  .legend-dot { width:8px; height:8px; border-radius:50%; }
  .chart-container { position:relative; height:180px; }

  /* ── Empty / Loading ── */
  .empty-state { text-align:center; padding:80px 32px; color:var(--muted); }
  .empty-state h3 { font-size:18px; font-weight:600; margin-bottom:8px; color:var(--text); }
  .loading { display:flex; align-items:center; justify-content:center; padding:80px; gap:10px; color:var(--muted); }
  .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media (max-width:700px) {
    .sidebar { display:none; }
    .main { padding:16px; }
    .summary-row { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="goHome()">
    <div class="logo-icon">🥚</div>
    <div>
      <div class="logo-text">Lucky Egg</div>
      <div class="logo-sub">SKU Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">Not connected</span>
    <button class="config-btn" onclick="toggleSetup()">⚙ Configure</button>
  </div>
</div>

<div class="app">
  <nav class="sidebar" id="sidebar"><!-- built by JS --></nav>
  <main class="main" id="mainContent">
    <div class="loading"><div class="spinner"></div> Loading...</div>
  </main>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let allData = [];
let activeSku = null;
let charts = {};

const REGIONS = { UK:'🇬🇧', US:'🇺🇸', CA:'🇨🇦' };
const AMZ_COLOR  = '#FF9900';
const TT_COLOR   = '#00b896';
const AMZ_LIGHT  = 'rgba(255,153,0,0.15)';
const TT_LIGHT   = 'rgba(0,184,150,0.15)';

// ── Demo data ─────────────────────────────────────────────────────────────────
function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().split('T')[0]; }

function generateDemo(){
  const skus=[
    {id:'LE-001',name:'Original Lucky Egg',group:'hero'},
    {id:'LE-002',name:'Lucky Egg Pro',group:'hero'},
    {id:'LE-003',name:'Lucky Egg Mini',group:'hero'},
    {id:'LE-004',name:'Lucky Egg Bundle',group:'hero'},
    {id:'LE-NL-01',name:'Sunrise Edition',group:'launch'},
    {id:'LE-NL-02',name:'Midnight Series',group:'launch'},
    {id:'LE-NL-03',name:'Crystal Pack',group:'launch'},
    {id:'LE-P-01',name:'Classic White',group:'pass'},
    {id:'LE-P-02',name:'Basic Set',group:'pass'},
  ];
  return skus.map(sku=>{
    const history=[];
    let base=rnd(30,120);
    for(let i=14;i>=0;i--){
      const amzUK=rnd(base*.2,base*.4), amzUS=rnd(base*.3,base*.5), amzCA=rnd(base*.1,base*.2);
      const ttUK=rnd(base*.1,base*.3),  ttUS=rnd(base*.1,base*.25), ttCA=rnd(0,base*.1);
      history.push({
        date:daysAgo(i),
        amzUK,amzUS,amzCA,ttUK,ttUS,ttCA,
        amazon:amzUK+amzUS+amzCA,
        tiktok:ttUK+ttUS+ttCA,
        total:amzUK+amzUS+amzCA+ttUK+ttUS+ttCA
      });
      base=Math.max(5,base+rnd(-10,12));
    }
    return {...sku,history};
  });
}

// ── Sheet connection ──────────────────────────────────────────────────────────
function extractSheetId(input){
  const m=input.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  return m?m[1]:input.trim();
}
async function connectSheet(){
  const input=document.getElementById('sheetInput').value.trim();
  if(!input) return;
  const id=extractSheetId(input);
  localStorage.setItem('sheetId',id);
  await loadSheetData(id);
}
async function loadSheetData(sheetId){
  setMain('<div class="loading"><div class="spinner"></div> Loading data...</div>');
  try{
    const configUrl=`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Config`;
    const salesUrl=`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Sales`;
    const [cRes,sRes]=await Promise.all([fetch(configUrl),fetch(salesUrl)]);
    const cJson=JSON.parse((await cRes.text()).match(/google\.visualization\.Query\.setResponse\((.+)\)/s)[1]);
    const sJson=JSON.parse((await sRes.text()).match(/google\.visualization\.Query\.setResponse\((.+)\)/s)[1]);
    allData=parseSheetData(cJson,sJson);
    document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString();
    document.getElementById('setupBanner')&&(document.getElementById('setupBanner').style.display='none');
    buildSidebar();
    showSku(allData[0]?.id);
  }catch(e){
    loadDemo();
  }
}
function parseSheetData(cJson,sJson){
  const skuMap={};
  cJson.table.rows.forEach(r=>{
    if(!r.c[0]?.v) return;
    skuMap[r.c[0].v]={id:r.c[0].v,name:r.c[1]?.v||r.c[0].v,group:(r.c[2]?.v||'pass').toLowerCase(),history:[]};
  });
  // Sales cols: Date | SKU_ID | Region | Channel | Units
  const bySkuDate={};
  sJson.table.rows.forEach(r=>{
    if(!r.c[0]?.v||!r.c[1]?.v) return;
    const date=r.c[0].v, id=r.c[1].v, region=(r.c[2]?.v||'').toUpperCase();
    const ch=(r.c[3]?.v||'').toLowerCase(), units=parseInt(r.c[4]?.v)||0;
    if(!bySkuDate[id]) bySkuDate[id]={};
    if(!bySkuDate[id][date]) bySkuDate[id][date]={date,amzUK:0,amzUS:0,amzCA:0,ttUK:0,ttUS:0,ttCA:0,amazon:0,tiktok:0,total:0};
    const d=bySkuDate[id][date];
    if(ch==='amazon'){
      if(region==='UK') d.amzUK+=units;
      else if(region==='US') d.amzUS+=units;
      else if(region==='CA') d.amzCA+=units;
      d.amazon+=units;
    } else if(ch==='tiktok'){
      if(region==='UK') d.ttUK+=units;
      else if(region==='US') d.ttUS+=units;
      else if(region==='CA') d.ttCA+=units;
      d.tiktok+=units;
    }
    d.total+=units;
  });
  Object.keys(skuMap).forEach(id=>{
    skuMap[id].history=Object.values(bySkuDate[id]||{}).sort((a,b)=>a.date.localeCompare(b.date)).slice(-15);
  });
  return Object.values(skuMap);
}
function loadDemo(){
  allData=generateDemo();
  document.getElementById('lastUpdated').textContent='Demo data';
  buildSidebar();
  showSku(allData[0]?.id);
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar(){
  const sidebar=document.getElementById('sidebar');
  const groups=[{key:'hero',label:'🏆 Hero',cls:'dot-hero'},{key:'launch',label:'🚀 Launches',cls:'dot-launch'},{key:'pass',label:'📦 Pass',cls:'dot-pass'}];
  sidebar.innerHTML=groups.map(g=>{
    const items=allData.filter(s=>s.group===g.key);
    if(!items.length) return '';
    return `<div class="sidebar-group">
      <div class="sidebar-group-label">${g.label}</div>
      ${items.map(s=>`<div class="sidebar-item ${s.group}" id="nav-${s.id}" onclick="showSku('${s.id}')">
        <span class="sku-dot ${g.cls}"></span>
        <span style="overflow:hidden;text-overflow:ellipsis">${s.name}</span>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function setActive(id){
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('nav-'+id);
  if(el){ el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
}

// ── SKU page ──────────────────────────────────────────────────────────────────
function showSku(id){
  activeSku=id;
  setActive(id);
  const sku=allData.find(s=>s.id===id);
  if(!sku){ setMain('<div class="empty-state"><h3>SKU not found</h3></div>'); return; }
  destroyCharts();

  const today=sku.history[sku.history.length-1]||{};
  const yest=sku.history[sku.history.length-2]||{};

  const setupHtml=localStorage.getItem('sheetId')?'':`
    <div class="setup-banner" id="setupBanner">
      <div><h3>Connect your Google Sheet</h3><p>Paste your Sheet URL to load live data</p></div>
      <div class="sheet-input-row">
        <input class="sheet-input" id="sheetInput" placeholder="https://docs.google.com/spreadsheets/d/..." />
        <button class="connect-btn" onclick="connectSheet()">Connect</button>
      </div>
    </div>`;

  setMain(`
    ${setupHtml}
    <div class="sku-page-header">
      <div>
        <div class="sku-title">${sku.name}</div>
        <div class="sku-meta">
          <span class="sku-id-badge">${sku.id}</span>
          <span class="badge ${sku.group}">${sku.group==='hero'?'🏆 Hero':sku.group==='launch'?'🚀 Launch':'📦 Pass'}</span>
        </div>
      </div>
    </div>

    <div class="summary-row" id="summaryRow"></div>

    <div class="breakdown-section">
      <div class="section-title">Channel × Region</div>
      <div class="breakdown-grid" id="breakdownGrid"></div>
    </div>

    <div class="chart-section">
      <div class="chart-header">
        <div class="chart-title">14-Day Trend</div>
        <div class="chart-legend">
          <div class="legend-item"><span class="legend-dot" style="background:${AMZ_COLOR}"></span>Amazon</div>
          <div class="legend-item"><span class="legend-dot" style="background:${TT_COLOR}"></span>TikTok Shop</div>
        </div>
      </div>
      <div class="chart-container"><canvas id="mainChart"></canvas></div>
    </div>
  `);

  // Summary cards
  const summaryDefs=[
    {key:'total',  label:'Total',         color:'linear-gradient(90deg,var(--accent),#8b7ff7)', dot:null},
    {key:'amazon', label:'Amazon',        color:AMZ_COLOR, dot:AMZ_COLOR},
    {key:'tiktok', label:'TikTok Shop',   color:TT_COLOR,  dot:TT_COLOR},
  ];
  document.getElementById('summaryRow').innerHTML=summaryDefs.map(def=>{
    const val=Math.round(today[def.key]||0);
    const prev=Math.round(yest[def.key]||0);
    const ch=chg(val,prev);
    return `<div class="summary-card ${def.key}">
      <div class="sc-label">
        ${def.dot?`<span class="sc-dot" style="background:${def.dot}"></span>`:''}
        ${def.label}
      </div>
      <div class="sc-value">${val}</div>
      <div class="sc-change ${ch.cls}">${ch.arrow} ${ch.str} DoD</div>
    </div>`;
  }).join('');

  // Breakdown grid: Amazon UK, TikTok UK, Amazon US, TikTok US, Amazon CA, (TikTok CA omitted if zero but kept for consistency)
  const breakdownDefs=[
    {key:'amzUK', label:'Amazon UK',      flag:'🇬🇧', color:AMZ_COLOR},
    {key:'ttUK',  label:'TikTok UK',      flag:'🇬🇧', color:TT_COLOR},
    {key:'amzUS', label:'Amazon US',      flag:'🇺🇸', color:AMZ_COLOR},
    {key:'ttUS',  label:'TikTok US',      flag:'🇺🇸', color:TT_COLOR},
    {key:'amzCA', label:'Amazon CA',      flag:'🇨🇦', color:AMZ_COLOR},
    {key:'ttCA',  label:'TikTok CA',      flag:'🇨🇦', color:TT_COLOR},
  ];
  document.getElementById('breakdownGrid').innerHTML=breakdownDefs.map(def=>{
    const val=Math.round(today[def.key]||0);
    const prev=Math.round(yest[def.key]||0);
    const ch=chg(val,prev);
    return `<div class="breakdown-card">
      <div class="bc-label">
        <span class="bc-flag">${def.flag}</span>
        <span class="sc-dot" style="background:${def.color};width:7px;height:7px;border-radius:50%;display:inline-block"></span>
        ${def.label}
      </div>
      <div class="bc-value">${val}</div>
      <div class="bc-change ${ch.cls}">${ch.arrow} ${ch.str} DoD</div>
    </div>`;
  }).join('');

  // Chart
  drawMainChart(sku);
}

function chg(val,prev){
  if(prev===0&&val===0) return {cls:'flat',arrow:'→',str:'0%'};
  if(prev===0) return {cls:'up',arrow:'▲',str:'New'};
  const pct=Math.round((val-prev)/prev*100);
  return {
    cls: pct>0?'up':pct<0?'down':'flat',
    arrow: pct>0?'▲':pct<0?'▼':'→',
    str: (pct>0?'+':'')+pct+'%'
  };
}

function drawMainChart(sku){
  const ctx=document.getElementById('mainChart');
  if(!ctx) return;
  const labels=sku.history.map(d=>{ const dt=new Date(d.date); return (dt.getMonth()+1)+'/'+(dt.getDate()); });
  const amzData=sku.history.map(d=>Math.round(d.amazon||0));
  const ttData=sku.history.map(d=>Math.round(d.tiktok||0));
  charts['main']=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {
          label:'Amazon',data:amzData,
          borderColor:AMZ_COLOR,backgroundColor:'rgba(255,153,0,0.08)',
          borderWidth:2.5,pointRadius:3,pointHoverRadius:5,
          pointBackgroundColor:AMZ_COLOR,tension:0.35,fill:true
        },
        {
          label:'TikTok Shop',data:ttData,
          borderColor:TT_COLOR,backgroundColor:'rgba(0,184,150,0.08)',
          borderWidth:2.5,pointRadius:3,pointHoverRadius:5,
          pointBackgroundColor:TT_COLOR,tension:0.35,fill:true
        }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#fff', titleColor:'#1a1d2e', bodyColor:'#6b7280',
          borderColor:'#e2e4ee', borderWidth:1,
          callbacks:{
            label:(i)=>` ${i.dataset.label}: ${Math.round(i.raw)} units`
          }
        }
      },
      scales:{
        x:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:10},maxRotation:0}},
        y:{grid:{color:'rgba(226,228,238,.6)'},ticks:{color:'#9ca3af',font:{size:10},callback:v=>Math.round(v)},beginAtZero:true}
      }
    }
  });
}

function destroyCharts(){
  Object.values(charts).forEach(c=>c.destroy());
  charts={};
}

function setMain(html){ document.getElementById('mainContent').innerHTML=html; }
function goHome(){ if(allData.length) showSku(allData[0].id); }
function toggleSetup(){
  const b=document.getElementById('setupBanner');
  if(b) b.style.display=b.style.display==='none'?'':'none';
}

// ── Init ──────────────────────────────────────────────────────────────────────
const savedId=localStorage.getItem('sheetId');
if(savedId){
  document.getElementById('sheetInput')&&(document.getElementById('sheetInput').value=savedId);
  loadSheetData(savedId);
} else {
  loadDemo();
}
</script>
</body>
</html>
